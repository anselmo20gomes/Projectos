<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tarefas - CRUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --accent-primary: #3b82f6;
            --accent-hover: #1e40af;
            --border-color: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .header {
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: var(--accent-danger);
            color: white;
            padding: 8px 12px;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--accent-success);
            color: white;
            padding: 8px 12px;
            font-size: 13px;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .task-item:hover {
            border-color: var(--accent-primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-success);
        }

        .task-text {
            flex: 1;
            color: var(--text-primary);
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-group {
                flex-direction: column;
            }

            .stats {
                gap: 12px;
            }

            .task-item {
                flex-wrap: wrap;
            }

            .task-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> Gestor de Tarefas</h1>
            <p>Organize suas tarefas de forma simples e eficiente</p>
        </div>

            <button class="btn btn-primary" onclick="addTask()">
                Adicionar
            </button>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Concluídas</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Pendentes</div>
            </div>
        </div>

        <div class="input-group">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Adicione uma nova tarefa..."
                autocomplete="off"
            >

        <div id="tasksList" class="tasks-list">
            <!-- <div class="empty-state"> -->
               <!--  <div class="empty-state-icon">✨</div> -->
                <p>Nenhuma tarefa ainda</p>
               <!--  <p style="font-size: 13px; margin-top: 8px;">Crie sua primeira tarefa acima</p> -->
            </div>
        </div>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const tasksList = document.getElementById('tasksList');
        const totalTasksEl = document.getElementById('totalTasks');
        const completedTasksEl = document.getElementById('completedTasks');
        const pendingTasksEl = document.getElementById('pendingTasks');

        const STORAGE_KEY = 'tasks_crud';

        // Carregar tarefas do localStorage
        function loadTasks() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // Salvar tarefas no localStorage
        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        // Adicionar nova tarefa
        function addTask() {
            const taskText = taskInput.value.trim();

            if (taskText === '') {
                alert('Por favor, escreva uma tarefa!');
                taskInput.focus();
                return;
            }

            const tasks = loadTasks();
            const newTask = {
                id: Date.now(),
                text: taskText,
                completed: false,
                createdAt: new Date().toISOString()
            };

            tasks.push(newTask);
            saveTasks(tasks);
            taskInput.value = '';
            taskInput.focus();
            renderTasks();
        }

        // Atualizar tarefa (marcar como concluída)
        function toggleTask(id) {
            const tasks = loadTasks();
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks(tasks);
                renderTasks();
            }
        }

        // Editar tarefa
        function editTask(id) {
            const tasks = loadTasks();
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const newText = prompt('Editar tarefa:', task.text);
            if (newText !== null && newText.trim() !== '') {
                task.text = newText.trim();
                saveTasks(tasks);
                renderTasks();
            }
        }

        // Eliminar tarefa
        function deleteTask(id) {
            if (confirm('Tem certeza que deseja eliminar esta tarefa?')) {
                let tasks = loadTasks();
                tasks = tasks.filter(t => t.id !== id);
                saveTasks(tasks);
                renderTasks();
            }
        }

        // Atualizar estatísticas
        function updateStats() {
            const tasks = loadTasks();
            const completed = tasks.filter(t => t.completed).length;
            const pending = tasks.length - completed;

            totalTasksEl.textContent = tasks.length;
            completedTasksEl.textContent = completed;
            pendingTasksEl.textContent = pending;
        }

        // Renderizar lista de tarefas
        function renderTasks() {
            const tasks = loadTasks();
            updateStats();

            if (tasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <p>Nenhuma tarefa ainda</p>
                        <p style="font-size: 13px; margin-top: 8px;">Crie sua primeira tarefa acima</p>
                    </div>
                `;
                return;
            }

            tasksList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="checkbox"
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})"
                    >
                    <span class="task-text">${escapeHtml(task.text)}</span>
                    <div class="task-actions">
                        <button class="btn btn-success" onclick="editTask(${task.id})">
                            Editar
                        </button>
                        <button class="btn btn-danger" onclick="deleteTask(${task.id})">
                            Eliminar
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Escape HTML para segurança
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Event listener para Enter
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Carregar tarefas ao iniciar
        renderTasks();
    </script>
</body>
</html>
