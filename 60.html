<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price360 - Categorias</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FF9500;
            --main-blue: #0049C6;
            --text-black: #000000;
            --bg-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-white);
            padding: 80px 10%;
        }

        .categories-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- TEXTOS --- */
        .subtitle {
            color: var(--main-blue);
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 400;
        }

        h2 {
            font-size: 64px;
            font-weight: 800;
            color: var(--text-black);
            line-height: 1.1;
            margin-bottom: 60px;
        }

        h2 span {
            color: var(--primary-orange);
            font-style: italic;
        }

        /* --- GRID DE CATEGORIAS --- */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 colunas como na imagem */
            gap: 25px;
        }

        .category-card {
            background: white;
            aspect-ratio: 1 / 1; /* Mantém o card quadrado */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }

        /* Estilização dos Ícones (SVG) */
        .category-card svg {
            width: 50px;
            height: 50px;
            stroke: var(--main-blue);
            stroke-width: 1.5;
            fill: none;
        }

        /* Responsividade para telas menores */
        @media (max-width: 1024px) {
            .categories-grid { grid-template-columns: repeat(3, 1fr); }
            h2 { font-size: 48px; }
        }

        @media (max-width: 600px) {
            .categories-grid { grid-template-columns: repeat(2, 1fr); }
            h2 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="categories-container">
        <p class="subtitle">Não sabe o que procura?</p>
        <h2>Procure por <br><span>categorias</span></h2>

        <div class="categories-grid">
            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M17 2H7l1 18a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2L17 2z"/><line x1="7" y1="8" x2="17" y2="8"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10"/><path d="M10 14V8a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10a7 7 0 0 0 14 0v-3"/><path d="M6 18c0 3 2 5 6 5s6-2 6-5"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="6" r="3"/><circle cx="9" cy="11" r="3"/><circle cx="15" cy="11" r="3"/><circle cx="12" cy="16" r="3"/><path d="M12 3v-1"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M6 18h12l1-9-3-3H8L5 9l1 9z"/><path d="M9 13l3 3 3-3"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M15 11c0 4-4 6-4 6s-4-2-4-6 4-6 4-6 4 2 4 6z"/><path d="M11 17l-2 3"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M7 11h10l-1 10H8l-1-10z"/><path d="M9 11V6a3 3 0 0 1 6 0v5"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M3 13c0-3.3 2.7-6 6-6s6 2.7 6 6H3z"/><path d="M15 13c0-3.3 2.7-6 6-6s6 2.7 6 6h-12"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </div>

            <div class="category-card">
                <svg viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M5 12h14"/><path d="M18 18l-12-12"/><path d="M6 18l12-12"/></svg>
            </div>
        </div>
    </div>

</body>
</html>
