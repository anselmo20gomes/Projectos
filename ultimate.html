<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price360 - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ultimate.css">
</head>
<body>
    <div class="hero-section">
        <div class="navbar-container">
            <header>
                <a href="#" class="logo">PRICE<span>360</span></a>
                
                <div class="search-bar">
                    <input type="text" placeholder="Pesquise por produtos ou marca ...">
                    <svg style="width:20px; position:absolute; right:15px; top:12px" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>

                <div class="nav-menu">
                    <a href="#">Home</a>
                    <a href="#">Sobre</a>
                    <button class="btn-login">Login</button>
                    <button class="btn-signin">Sign in</button>
                </div>
            </header>
        </div>

        <main class="hero-content">
            <h1>Todos os preços, de todas as <span>lojas</span>, num só lugar</h1>
            <p>Compare preços de produtos essenciais no Kero, Shoprite e muito mais. Crie as suas listas e encontre sempre a melhor oferta.</p>

            <div class="hero-actions">
                <button class="btn-cta">Conhecer o Price360</button>
                <div class="btn-search-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
        </main>
    </div>

    <section class="categories-section">
        <div class="categories-container">
            <p class="subtitle">Não sabe o que procura?</p>
            <h2>Procure por <br><span>categorias</span></h2>

            <div class="categories-grid">
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M17 2H7l1 18a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2L17 2z"/><line x1="7" y1="8" x2="17" y2="8"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10"/><path d="M10 14V8a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10a7 7 0 0 0 14 0v-3"/><path d="M6 18c0 3 2 5 6 5s6-2 6-5"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="6" r="3"/><circle cx="9" cy="11" r="3"/><circle cx="15" cy="11" r="3"/><circle cx="12" cy="16" r="3"/><path d="M12 3v-1"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M6 18h12l1-9-3-3H8L5 9l1 9z"/><path d="M9 13l3 3 3-3"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M15 11c0 4-4 6-4 6s-4-2-4-6 4-6 4-6 4 2 4 6z"/><path d="M11 17l-2 3"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M7 11h10l-1 10H8l-1-10z"/><path d="M9 11V6a3 3 0 0 1 6 0v5"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M3 13c0-3.3 2.7-6 6-6s6 2.7 6 6H3z"/><path d="M15 13c0-3.3 2.7-6 6-6s6 2.7 6 6h-12"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                </div>
                <div class="category-card">
                    <svg viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M5 12h14"/><path d="M18 18l-12-12"/><path d="M6 18l12-12"/></svg>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
